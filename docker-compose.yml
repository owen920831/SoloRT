services:
  solort:
    build:
      context: .
      target: dev
    image: solort:dev
    container_name: solort-api
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ./README.md:/app/README.md
      - ./pyproject.toml:/app/pyproject.toml

  test:
    build:
      context: .
      target: dev
    image: solort:dev
    profiles:
      - test
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ./README.md:/app/README.md
      - ./pyproject.toml:/app/pyproject.toml
    command: pytest

  lint:
    build:
      context: .
      target: dev
    image: solort:dev
    profiles:
      - lint
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ./README.md:/app/README.md
      - ./pyproject.toml:/app/pyproject.toml
    command: ruff check .

  solort-gpu:
    build:
      context: .
      target: llm
    image: solort:qwen3-0.6b
    profiles:
      - gpu
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      SOLORT_EXECUTOR: transformers
      SOLORT_MODEL_ID: ${SOLORT_MODEL_ID:-Qwen/Qwen3-0.6B}
      SOLORT_ENABLE_THINKING: "0"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ./README.md:/app/README.md
      - ./pyproject.toml:/app/pyproject.toml
      - ~/.cache/huggingface:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
