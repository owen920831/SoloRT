services:
  test:
    build:
      context: .
      target: dev
    image: solort:dev
    profiles:
      - test
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ./README.md:/app/README.md
      - ./docs:/app/docs
      - ./pyproject.toml:/app/pyproject.toml
    command: pytest

  lint:
    build:
      context: .
      target: dev
    image: solort:dev
    profiles:
      - lint
    environment:
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ./README.md:/app/README.md
      - ./docs:/app/docs
      - ./pyproject.toml:/app/pyproject.toml
    command: ruff check .

  solort-gpu:
    build:
      context: .
      target: llm
    image: solort:qwen3-4b-spec
    profiles:
      - gpu
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      SOLORT_EXECUTOR: ${SOLORT_EXECUTOR:-paged}
      SOLORT_MODEL_ID: ${SOLORT_MODEL_ID:-Qwen/Qwen3-4B}
      SOLORT_SPECULATIVE_DRAFT_MODEL_ID: ${SOLORT_SPECULATIVE_DRAFT_MODEL_ID:-Qwen/Qwen3-0.6B}
      SOLORT_SPECULATIVE_TOKENS: ${SOLORT_SPECULATIVE_TOKENS:-4}
      SOLORT_ATTENTION_BACKEND: ${SOLORT_ATTENTION_BACKEND:-flashinfer}
      SOLORT_ENABLE_THINKING: "0"
      HF_HOME: /root/.cache/huggingface
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
      - ./benchmarks:/app/benchmarks
      - ./README.md:/app/README.md
      - ./docs:/app/docs
      - ./pyproject.toml:/app/pyproject.toml
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities:
                - gpu
